    <script>
        // 添加在原有script中
        function updateLoveTime() {
            const startDate = new Date(2024, 9, 26, 0, 14); // 月份从0开始计算
            const now = new Date();
            const diff = now - startDate;
        
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        
            // 数字动画效果
            animateNumber('loveDays', days);
            animateNumber('loveHours', hours);
            animateNumber('loveMinutes', minutes);
            animateNumber('loveSeconds', seconds);
        }
        
        function animateNumber(elementId, newValue) {
            const element = document.getElementById(elementId);
            const current = parseInt(element.innerText) || 0;
            if (current === newValue) return;
            
            element.style.transform = 'scale(1.2)';
            element.style.color = '#ffeb3b';
            setTimeout(() => {
                element.innerText = newValue;
                element.style.transform = 'scale(1)';
                element.style.color = '#fff';
            }, 200);
        }
        
        // 每秒更新时间
        setInterval(updateLoveTime, 1000);
        updateLoveTime(); // 立即执行一次
    </script>

    function updateYearTabStatus() {

        const emojis = seasonEmojis[currentSeason];
        // 创建 20-30 个飘落元素
        const numItems = Math.floor(Math.random() * 11) + 20;
        
        for (let i = 0; i < numItems; i++) {
            setTimeout(() => {
                const item = document.createElement('div');
                item.className = 'season-falling-item';
                item.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                item.style.left = Math.random() * 100 + '%';
                item.style.fontSize = (Math.random() * 20 + 20) + 'px';
                const duration = Math.random() * 3 + 3;
                item.style.animationDuration = duration + 's';
                
                container.appendChild(item);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    if (item.parentNode) {
                        item.parentNode.removeChild(item);
                    }
                }, duration * 1000);
            }, i * 100);
        }
    }

    // 渲染瀑布流根据选中的年份季节
    function renderMasonryGallery() {
        const gallery = document.getElementById('masonryGallery');
        // 添加翻页动画类
        gallery.classList.add('fade-turn');
        
        setTimeout(() => {
            gallery.innerHTML = '';
            
            const images = imageData[currentYear][currentSeason];
            
            if (images.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-message';
                emptyDiv.innerHTML = '💌 故事还在继续，期待未来更多美好回忆...';
                gallery.appendChild(emptyDiv);
            } else {
                images.forEach(imgName => {
                    const item = document.createElement('div');
                    item.className = 'masonry-item';
                    const img = document.createElement('img');
                    img.src = `new-images/${currentYear}/${currentSeason}/${imgName}`;
                    img.alt = '我们的回忆';
                    item.appendChild(img);
                    gallery.appendChild(item);
                });
            }
            
            // 移除动画类，准备下次触发
            setTimeout(() => {
                gallery.classList.remove('fade-turn');
            }, 600);
            
            // 触发季节飘落特效
            createSeasonFalling();
        }, 200);
    }

    // 初始化筛选事件
    function initFilter() {
        // 年份切换
        document.querySelectorAll('.year-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                // 如果这个年份一张图片都没有，不能点击（重新判断，保证使用最新的imageData）
                const year = this.dataset.year;
                const hasImages = Object.values(imageData[year] || {}).some(arr => arr.length > 0);
                if (!hasImages) {
                    return;
                }
                document.querySelector('.year-tab.active').classList.remove('active');
                this.classList.add('active');
                currentYear = this.dataset.year;
                // 自动根据当前时间选择季节
                const now = new Date();
                const month = now.getMonth() + 1;
                let season;
                if (month >= 3 && month <= 5) season = 'spring';
                else if (month >= 6 && month <= 8) season = 'summer';
                else if (month >= 9 && month <= 11) season = 'autumn';
                else season = 'winter';
                currentSeason = season;
                document.querySelectorAll('.season-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.season === season) {
                        btn.classList.add('active');
                    }
                });
                renderMasonryGallery();
            });
        });

        // 季节切换
        document.querySelectorAll('.season-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelector('.season-btn.active').classList.remove('active');
                this.classList.add('active');
                currentSeason = this.dataset.season;
                renderMasonryGallery();
            });
        });
    }

    // ========== 使用 GitHub API + 免费 CORS 代理 实现全局持久化存储 ==========
    // 数据直接保存在你仓库的 counter.json 和 danmaku.json，免费稳定，全平台同步
    // 使用 CORS Anywhere 免费代理解决跨域问题，不需要你自己搭建任何服务

    // 你的 GitHub 信息
    const GITHUB = {
        owner: 'lccandsr',
        repo: 'lccandsr.github.io',
        branch: 'main',
        // 使用免费公共CORS代理
        corsProxy: 'https://api.allorigins.win/raw?url=',
        corsWriteProxy: 'https://cors-anywhere.herokuapp.com/'
    };

    // 访问次数统计 - 从你的仓库counter.json获取，全局同步
    let visitorCount = 0;
    let loveCount = 0;

    // 初始化计数，从GitHub加载
    function initCounter() {
        // 通过CORS代理获取counter.json
        const url = GITHUB.corsProxy + 
            encodeURIComponent(`https://raw.githubusercontent.com/${GITHUB.owner}/${GITHUB.repo}/${GITHUB.branch}/counter.json?t=${Date.now()}`);
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                visitorCount = data.visitors || 0;
                loveCount = data.loveCount || 0;
                // 访问一次 +1
                visitorCount++;
                document.getElementById('visitorCount').innerText = visitorCount;
                document.getElementById('loveCount').innerText = loveCount;
                // 保存新计数回GitHub
                saveCounter();
            })
            .catch(error => {
                console.error('从GitHub加载计数失败，降级到localStorage:', error);
                visitorCount = parseInt(localStorage.getItem('visitorCount')) || 0;
                visitorCount++;
                loveCount = parseInt(localStorage.getItem('loveCount')) || 0;
                document.getElementById('visitorCount').innerText = visitorCount;
                document.getElementById('loveCount').innerText = loveCount;
                localStorage.setItem('visitorCount', visitorCount);
                localStorage.setItem('loveCount', loveCount);
            });
    }

    // 获取文件SHA，然后更新文件
    function saveCounter() {
        const content = JSON.stringify({visitors: visitorCount, loveCount: loveCount}, null, 2);
        updateGithubFile('counter.json', content, `update counter: ${visitorCount} visits, ${loveCount} loves`);
    }

    // 更新GitHub上的文件内容 - 通过Cloudflare Worker代理（保护token不泄露）
    // 部署worker后把WORKER_URL改成你自己的地址
    // Token放在Worker里，不会暴露在前端代码中，更安全
    const WORKER_URL = "https://lccandsr.1821341259.workers.dev/";
    
    function updateGithubFile(filename, content, commitMessage) {
        fetch(WORKER_URL + filename, {
            method: 'POST',
            body: content
        })
        .then(response => response.json())
        .then(result => {
            console.log('文件更新成功:', result);
            localStorage.setItem('visitorCount', visitorCount);
            localStorage.setItem('loveCount', loveCount);
        })
        .catch(err => {
            console.error('更新失败，检查Worker配置:', err);
            // 更新失败也没关系，已经保存在localStorage了，下次再同步
            localStorage.setItem('visitorCount', visitorCount);
            localStorage.setItem('loveCount', loveCount);
        });
    }

    // 访问次数统计初始化
    function initVisitorCounter() {
        // 现在统一用initCounter
    }

    // 爱你的按钮 - 点击特效
    const emojis = ['❤️', '💖', '💗', '🌟', '⭐', '✨', '🌸', '💮', '🌹'];

    function createFallingEffect() {
        const container = document.getElementById('fallingContainer');
        // 每次点击产生 10-20 个随机飘落元素
        const numItems = Math.floor(Math.random() * 11) + 10;
        
        for (let i = 0; i < numItems; i++) {
            setTimeout(() => {
                const item = document.createElement('div');
                item.className = 'falling-item';
                item.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                item.style.left = Math.random() * 100 + '%';
                item.style.fontSize = (Math.random() * 20 + 16) + 'px';
                const duration = Math.random() * 3 + 2;
                item.style.animationDuration = duration + 's';
                
                container.appendChild(item);
                
                // 动画结束后移除元素
                setTimeout(() => {
                    if (item.parentNode) {
                        item.parentNode.removeChild(item);
                    }
                }, duration * 1000);
            }, i * 80);
        }
    }

    function updateLoveCount() {
        document.getElementById('loveCount').innerText = loveCount;
        // 同步到jsonblob全局存储
        saveCounter();
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
        initFilter();
        updateYearTabStatus(); // 初始加载时就更新年份标签样式
        renderMasonryGallery(); // 先用默认数据渲染，保证一开始就能看到照片
        loadImageData();
        initCounter(); // 从GitHub加载全局计数，全平台同步
        updateLoveCount();
        
        document.getElementById('loveButton').addEventListener('click', function() {
            loveCount++;
            updateLoveCount();
            createFallingEffect();
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 150);
        });
        
        // 情侣动画交互（添加空判断，避免报错阻塞）
        const coupleAnim = document.querySelector('.couple-animation');
        if (coupleAnim) {
            coupleAnim.addEventListener('click', () => {
                const heart = document.querySelector('.heart');
                if (heart) {
                    heart.style.animation = 'heartExplosion 0.8s';
                    setTimeout(() => {
                        heart.style.animation = 'heartbeat 1.2s infinite';
                    }, 800);
                }
            });
        }
    });

    // 新增心跳爆炸动画
    const style = document.createElement('style');
    style.textContent = `
        @keyframes heartExplosion {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(5); opacity: 0; }
        }
    `;
    document.head.appendChild(style);

    // ========== 我想说 - 弹幕功能 ==========
    // 拖尾特效类型
    const trailTypes = ['❤️', '💖', '🌟', '⭐', '🌸', '💮'];
    
    // 从danmaku.json加载留言（持久化保存在项目文件中）
    let danmakuMessages = [
        '梁小闯爱佘小蕊',
        '要一直一直在一起',
        '未来可期'
    ];
    
    // 页面加载时从GitHub仓库加载最新弹幕
    function loadDanmakuFromFile() {
        const url = GITHUB.corsProxy + 
            encodeURIComponent(`https://raw.githubusercontent.com/${GITHUB.owner}/${GITHUB.repo}/${GITHUB.branch}/danmaku.json?t=${Date.now()}`);
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (Array.isArray(data) && data.length > 0) {
                    danmakuMessages = data;
                    localStorage.setItem('danmakuMessages', JSON.stringify(danmakuMessages));
                    console.log('从GitHub加载成功，共', danmakuMessages.length, '条弹幕');
                }
            })
            .catch(error => {
                console.error('从GitHub加载弹幕失败，降级到localStorage:', error);
                const localData = localStorage.getItem('danmakuMessages');
                if (localData) {
                    danmakuMessages = JSON.parse(localData);
                }
            });
    }

    // 保存弹幕到GitHub仓库的danmaku.json
    function saveDanmakuToGithub() {
        const content = JSON.stringify(danmakuMessages, null, 2);
        updateGithubFile('danmaku.json', content, `add new danmaku, total ${danmakuMessages.length}`);
    }

    // 创建弹幕
    function createDanmaku(text, isNew = false) {
        const container = document.getElementById('danmakuContainer');
        const item = document.createElement('div');
        item.className = 'danmaku-item';
        item.innerText = text;
        
        // 随机颜色
        const colors = ['#ff3366', '#ff6699', '#ff99cc', '#ff3399', '#ff6b6b', '#ff0000', '#ff6600', '#ff9933', '#ffcc00'];
        item.style.color = colors[Math.floor(Math.random() * colors.length)];
        
        // 随机字体大小 - 新增弹幕固定大号，循环弹幕随机大小20px~32px
        if (isNew) {
            item.style.fontSize = '36px';
            item.style.fontWeight = 'bold';
        } else {
            const fontSize = Math.floor(Math.random() * 13) + 20; // 20~32px
            item.style.fontSize = fontSize + 'px';
        }
        
        // 随机垂直位置 (在弹幕区域内分散，预留上下padding避免被遮挡)
        const topPos = 10 + Math.random() * 70; // 上下各留10%空间
        item.style.top = topPos + '%';
        
        // 随机速度 (8-18秒)，不快不慢，不会太挤也不会太慢
        const duration = (Math.random() * 10 + 8);
        item.style.animationDuration = duration + 's';
        
        container.appendChild(item);
        
        // 创建拖尾特效
        let charIndex = 0;
        const trailInterval = setInterval(() => {
            if (charIndex >= text.length) {
                clearInterval(trailInterval);
                return;
            }
            // 在弹幕当前位置创建拖尾
            const rect = item.getBoundingClient();
            const containerRect = container.getBoundingClientRect();
            const currentX = rect.left - containerRect.left + (charIndex * 16);
            const currentY = rect.top - containerRect.top + (rect.height / 2);
            
            const trail = document.createElement('div');
            trail.className = 'trail-item';
            trail.innerText = trailTypes[Math.floor(Math.random() * trailTypes.length)];
            trail.style.left = currentX + 'px';
            trail.style.top = currentY + 'px';
            container.appendChild(trail);
            
            setTimeout(() => {
                if (trail.parentNode) trail.parentNode.removeChild(trail);
            }, 1000);
            
            charIndex++;
        }, 100);
        
        // 动画结束移除
        setTimeout(() => {
            if (item.parentNode) item.parentNode.removeChild(item);
        }, duration * 1000);
    }

    // 循环播放弹幕
    function startDanmakuLoop() {
        if (danmakuMessages.length === 0) return;
        
        let index = 0;
        function nextDanmaku() {
            createDanmaku(danmakuMessages[index]);
            index = (index + 1) % danmakuMessages.length;
            // 间隔 5-8 秒发送下一条，避免拥挤
            setTimeout(nextDanmaku, (Math.random() * 3 + 5) * 1000);
        }
        nextDanmaku();
    }

    // 打开关闭弹窗
    function toggleModal() {
        const overlay = document.getElementById('speakModalOverlay');
        overlay.classList.toggle('show');
        if (overlay.classList.contains('show')) {
            document.getElementById('speakInput').focus();
        }
    }

    // 提交留言
    function submitSpeak() {
        const input = document.getElementById('speakInput');
        let text = input.value.trim();
        if (!text) return;
        
        // 加上当前时间，精确到分钟
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hour = String(now.getHours()).padStart(2, '0');
        const minute = String(now.getMinutes()).padStart(2, '0');
        const timeStr = `${year}-${month}-${day} ${hour}:${minute}`;
        text = `${text} [${timeStr}]`;
        
        danmakuMessages.push(text);
        localStorage.setItem('danmakuMessages', JSON.stringify(danmakuMessages));
        // 保存到GitHub，全局同步
        saveDanmakuToGithub();
        // 提交后立即让这条弹幕飘出来，新增弹幕固定大号突出显示
        createDanmaku(text, true);
        input.value = '';
        toggleModal();
    }

    // 初始化弹幕和按钮事件
    document.addEventListener('DOMContentLoaded', function() {
        // 先从localStorage加载，保证立即有数据可播
        const localData = localStorage.getItem('danmakuMessages');
        if (localData) {
            danmakuMessages = JSON.parse(localData);
        }
        // 立即开始循环播放
        startDanmakuLoop();
        // 异步从GitHub加载最新数据，加载完成后更新
        loadDanmakuFromFile();
        
        document.getElementById('speakFab').addEventListener('click', toggleModal);
        document.getElementById('speakModalOverlay').addEventListener('click', function(e) {
            if (e.target === this) toggleModal();
        });
        document.getElementById('btnCancel').addEventListener('click', toggleModal);
        document.getElementById('btnSubmit').addEventListener('click', submitSpeak);
    });

</script>
